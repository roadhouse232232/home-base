<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Home Base</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#fafaf9">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Home Base">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
:root {
  --bg: #fafaf9;
  --surface: #ffffff;
  --border: #e7e5e4;
  --ink: #1c1917;
  --muted: #a8a29e;
  --muted2: #78716c;
  --accent: #047857;
  --amber: #f59e0b;
  --amber-bg: #fffbeb;
  --amber-border: #fcd34d;
  --rose: #e11d48;
}
* { box-sizing: border-box; }
html, body { margin:0; padding:0; }
body {
  background: var(--bg);
  color: var(--ink);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  -webkit-font-smoothing: antialiased;
}
button { font-family: inherit; }
:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
.mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
#app { min-height: 100vh; display:flex; flex-direction:column; }

.header { position: sticky; top:0; background:var(--bg); border-bottom:1px solid var(--border); z-index:10; padding-top: env(safe-area-inset-top); }
.header-inner { max-width:480px; margin:0 auto; padding:18px 16px 12px; display:flex; align-items:center; justify-content:space-between; }
.app-title { font-size:18px; font-weight:700; letter-spacing:-0.01em; margin:0; }
.reset-link { font-size:12px; color:var(--muted); background:none; border:none; cursor:pointer; }

.main { flex:1; overflow-y:auto; }
.main-inner { max-width:480px; margin:0 auto; padding:16px 16px 110px; }

.section-title { font-size:16px; font-weight:700; margin: 0 0 12px; }
.row-between { display:flex; align-items:center; justify-content:space-between; gap:8px; margin-bottom:12px; }
.muted-text { font-size:14px; color:var(--muted2); margin:0; }

.btn-primary { display:inline-flex; align-items:center; gap:6px; background:var(--accent); color:#fff; border:none; font-size:14px; padding:8px 12px; border-radius:8px; cursor:pointer; }
.btn-primary:active { opacity:0.85; }

.chip-row { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:16px; }
.chip { display:inline-flex; align-items:center; gap:6px; background:var(--amber-bg); border:1px solid var(--amber-border); color:#92400e; font-size:12px; padding:6px 10px; border-radius:999px; cursor:pointer; }
.dot { width:6px; height:6px; border-radius:2px; background:var(--amber); display:inline-block; }

.toggle-group { display:inline-flex; background:#f0efed; border-radius:8px; padding:4px; margin-bottom:16px; gap:2px; }
.toggle-btn { display:flex; align-items:center; gap:6px; font-size:13px; padding:6px 12px; border-radius:6px; border:none; background:none; color:var(--muted2); cursor:pointer; }
.toggle-btn.active { background:#fff; color:var(--ink); box-shadow:0 1px 2px rgba(0,0,0,0.06); }

.cal-nav { display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; }
.cal-nav button { background:none; border:none; color:var(--muted2); padding:6px; cursor:pointer; }
.cal-month { font-size:14px; font-weight:600; margin:0; }
.cal-grid-labels, .cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:4px; }
.cal-grid-labels div { text-align:center; font-size:11px; color:var(--muted); padding:4px 0; }
.cal-cell { aspect-ratio:1; border:none; background:none; border-radius:8px; display:flex; flex-direction:column; align-items:center; justify-content:center; font-size:13px; color:var(--ink); cursor:pointer; gap:2px; }
.cal-cell.today { background:#ecfdf5; color:#065f46; box-shadow: inset 0 0 0 1px #6ee7b7; }
.cal-cell.selected { background:var(--accent); color:#fff; }
.cal-cell.empty { visibility:hidden; }
.cal-dots { display:flex; gap:2px; }
.cal-dot { width:4px; height:4px; border-radius:1px; display:inline-block; }

.day-panel { margin-top:16px; background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:12px; }
.day-panel-title { font-size:11px; text-transform:uppercase; color:var(--muted); margin:0 0 10px; }
.task-row { display:flex; align-items:center; justify-content:space-between; padding:6px 0; }
.task-check-label { display:flex; align-items:center; gap:10px; background:none; border:none; cursor:pointer; text-align:left; flex:1; min-width:0; padding:0; }
.check-box { width:20px; height:20px; border-radius:5px; border:1.5px solid #d6d3d1; display:flex; align-items:center; justify-content:center; flex-shrink:0; color:#fff; }
.check-box.done { background:var(--accent); border-color:var(--accent); }
.task-name { font-size:14px; }
.task-name.done { text-decoration:line-through; color:var(--muted); }
.icon-btn { background:none; border:none; color:var(--muted); padding:4px; cursor:pointer; flex-shrink:0; display:inline-flex; }

.group-block { margin-bottom:20px; }
.group-label { font-size:11px; text-transform:uppercase; color:var(--muted); margin:0 0 8px; }
.list-card { background:var(--surface); border:1px solid var(--border); border-radius:10px; overflow:hidden; }
.list-card > * + * { border-top:1px solid #f1efed; }
.list-row { display:flex; align-items:center; justify-content:space-between; padding:12px; gap:8px; }
.list-row-main { min-width:0; }
.list-row-title { font-size:14px; margin:0 0 2px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.list-row-sub { font-size:11px; color:var(--muted); margin:0; }
.round-check { width:28px; height:28px; border-radius:999px; border:1.5px solid #d6d3d1; background:none; display:flex; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0; color:#fff; }
.round-check.done { background:var(--accent); border-color:var(--accent); }

.empty-text { text-align:center; color:var(--muted); font-size:14px; padding:48px 0; }

.input-row { display:flex; gap:8px; margin-bottom:16px; }
.text-input { flex:1; border:1px solid #d6d3d1; border-radius:8px; padding:10px 12px; font-size:14px; background:#fff; color:var(--ink); }

.simple-row { display:flex; align-items:center; justify-content:space-between; padding:12px; gap:8px; }
.simple-row-left { display:flex; align-items:center; gap:10px; flex:1; min-width:0; cursor:pointer; background:none; border:none; text-align:left; padding:0; }
.simple-text { font-size:14px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.simple-text.done { color:var(--muted); text-decoration:line-through; }
.sq-check { width:20px; height:20px; border-radius:5px; border:1.5px solid #d6d3d1; flex-shrink:0; display:flex; align-items:center; justify-content:center; color:#fff; }
.sq-check.done { background:var(--accent); border-color:var(--accent); }
.clear-btn { font-size:12px; color:var(--muted); background:none; border:none; cursor:pointer; display:flex; align-items:center; gap:4px; }

.nav { position:fixed; bottom:0; left:0; right:0; background:#fff; border-top:1px solid var(--border); z-index:10; padding-bottom: env(safe-area-inset-bottom); }
.nav-inner { max-width:480px; margin:0 auto; display:flex; justify-content:space-around; padding:8px 0; }
.nav-btn { display:flex; flex-direction:column; align-items:center; gap:2px; background:none; border:none; font-size:11px; color:var(--muted); cursor:pointer; padding:4px 16px; }
.nav-btn.active { color:var(--accent); }

.modal-overlay { position:fixed; inset:0; background:rgba(28,25,23,0.45); display:flex; align-items:flex-end; justify-content:center; z-index:50; }
@media (min-width:480px){ .modal-overlay{ align-items:center; } }
.modal-card { background:#fff; border-radius:18px 18px 0 0; width:100%; max-width:420px; padding:20px; max-height:90vh; overflow-y:auto; padding-bottom: calc(20px + env(safe-area-inset-bottom)); }
@media (min-width:480px){ .modal-card{ border-radius:18px; padding-bottom:20px; } }
.modal-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
.modal-title { font-size:16px; font-weight:700; margin:0; }
.field-label { font-size:12px; color:var(--muted2); margin-bottom:4px; display:block; }
.freq-row { display:flex; gap:8px; margin-bottom:16px; }
.freq-btn { flex:1; text-align:center; padding:8px; border-radius:8px; border:1px solid #d6d3d1; background:#fff; color:var(--muted2); font-size:13px; cursor:pointer; text-transform:capitalize; }
.freq-btn.active { background:var(--accent); border-color:var(--accent); color:#fff; }
.dow-row { display:flex; gap:6px; margin-bottom:16px; }
.dow-btn { width:34px; height:34px; border-radius:999px; border:none; background:#f0efed; color:var(--muted2); font-size:12px; cursor:pointer; }
.dow-btn.active { background:var(--accent); color:#fff; }
.num-input { width:80px; border:1px solid #d6d3d1; border-radius:8px; padding:8px 10px; font-size:14px; }
.modal-actions { display:flex; gap:8px; margin-top:8px; }
.btn-danger-outline { display:flex; align-items:center; gap:6px; padding:10px 14px; border-radius:8px; border:1px solid #fecdd3; color:var(--rose); background:#fff; font-size:13px; cursor:pointer; }
.btn-save { flex:1; background:var(--accent); color:#fff; border:none; border-radius:8px; padding:10px; font-size:14px; font-weight:600; cursor:pointer; }
</style>
</head>
<body>
<div id="app"></div>

<script>
var DOW = ['S','M','T','W','T','F','S'];
var DOW_FULL = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
var MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
var STORAGE_KEY = 'home-base-planner-v1';

var state = {
  activeTab: 'recurring',
  recurringTasks: [],
  todoItems: [],
  shoppingItems: [],
  recurringView: 'calendar',
  viewDate: startOfDay(new Date()),
  selectedDay: startOfDay(new Date()),
  todoInput: '',
  shoppingInput: '',
  modal: { open: false, editingId: null, name: '', freq: 'weekly', days: [1], dom: '1' }
};

/* ---------- date helpers ---------- */
function pad(n){ return String(n).padStart(2,'0'); }
function dateKey(d){ return d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate()); }
function startOfDay(d){ var x = new Date(d); x.setHours(0,0,0,0); return x; }
function addDays(d,n){ var x = new Date(d); x.setDate(x.getDate()+n); return x; }
function daysInMonth(y,m){ return new Date(y, m+1, 0).getDate(); }
function sameDay(a,b){ return dateKey(a) === dateKey(b); }

function isDueOnDate(task, date){
  if(task.frequency === 'daily') return true;
  if(task.frequency === 'weekly') return (task.daysOfWeek||[]).indexOf(date.getDay()) !== -1;
  if(task.frequency === 'monthly'){
    var last = daysInMonth(date.getFullYear(), date.getMonth());
    var target = Math.min(task.dayOfMonth || 1, last);
    return date.getDate() === target;
  }
  return false;
}

function scheduleLabel(task){
  if(task.frequency === 'daily') return 'Every day';
  if(task.frequency === 'weekly'){
    var days = (task.daysOfWeek||[]).slice().sort(function(a,b){return a-b;}).map(function(i){return DOW_FULL[i];});
    return days.length ? 'Every ' + days.join(', ') : 'Weekly';
  }
  if(task.frequency === 'monthly'){
    var n = task.dayOfMonth || 1;
    var suffix = (n===1||n===21||n===31) ? 'st' : (n===2||n===22) ? 'nd' : (n===3||n===23) ? 'rd' : 'th';
    return 'Monthly on the ' + n + suffix;
  }
  return '';
}

function nextOccurrence(task, from){
  var d = startOfDay(from);
  for(var i=0;i<60;i++){
    var key = dateKey(d);
    if(isDueOnDate(task, d)){
      if(!(i===0 && task.completions && task.completions[key])) return d;
    }
    d = addDays(d,1);
  }
  return null;
}

function buildMonthGrid(year, month){
  var first = new Date(year, month, 1);
  var startOffset = first.getDay();
  var total = daysInMonth(year, month);
  var cells = [];
  for(var i=0;i<startOffset;i++) cells.push(null);
  for(var day=1; day<=total; day++) cells.push(new Date(year, month, day));
  while(cells.length % 7 !== 0) cells.push(null);
  return cells;
}

function escapeHtml(str){
  return String(str).replace(/[&<>"']/g, function(ch){
    return { '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[ch];
  });
}

/* ---------- persistence (plain localStorage, works standalone) ---------- */
function loadState(){
  try {
    var raw = localStorage.getItem(STORAGE_KEY);
    if(raw){
      var parsed = JSON.parse(raw);
      state.recurringTasks = parsed.recurringTasks || [];
      state.todoItems = parsed.todoItems || [];
      state.shoppingItems = parsed.shoppingItems || [];
    }
  } catch(e){ console.warn('Could not load saved data', e); }
}
function persist(){
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      recurringTasks: state.recurringTasks,
      todoItems: state.todoItems,
      shoppingItems: state.shoppingItems
    }));
  } catch(e){ console.warn('Could not save data', e); }
}

/* ---------- icons (hand-rolled, no external library) ---------- */
function icon(name, size){
  size = size || 18;
  var paths = {
    plus: '<line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>',
    chevronLeft: '<polyline points="15 18 9 12 15 6"/>',
    chevronRight: '<polyline points="9 18 15 12 9 6"/>',
    check: '<polyline points="20 6 9 17 4 12"/>',
    trash: '<path d="M3 6h18"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>',
    x: '<line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>',
    pencil: '<path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 1 1 3 3L7 19l-4 1 1-4Z"/>',
    calendar: '<rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>',
    list: '<line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/>',
    rotate: '<path d="M3 12a9 9 0 1 0 3-6.7L3 8"/><path d="M3 3v5h5"/>',
    repeat: '<path d="M17 1l4 4-4 4"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><path d="M7 23l-4-4 4-4"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/>',
    checkSquare: '<path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>',
    cart: '<circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>'
  };
  return '<svg width="' + size + '" height="' + size + '" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' + (paths[name]||'') + '</svg>';
}

/* ---------- mutations ---------- */
function setActiveTab(tab){ state.activeTab = tab; render(); }
function setRecurringView(v){ state.recurringView = v; render(); }
function navMonth(delta){
  state.viewDate = new Date(state.viewDate.getFullYear(), state.viewDate.getMonth()+delta, 1);
  render();
}
function selectDay(y,m,d){
  state.selectedDay = new Date(y,m,d);
  render();
}

function openNewTask(){
  state.modal = { open:true, editingId:null, name:'', freq:'weekly', days:[1], dom:'1' };
  render();
}
function openEditTask(id){
  var t = state.recurringTasks.find(function(x){return x.id===id;});
  if(!t) return;
  state.modal = {
    open:true, editingId:id, name:t.name, freq:t.frequency,
    days: t.daysOfWeek ? t.daysOfWeek.slice() : [1],
    dom: String(t.dayOfMonth || 1)
  };
  render();
}
function closeModal(){ state.modal.open = false; render(); }
function setModalFreq(f){ state.modal.freq = f; render(); }
function toggleModalDay(i){
  var days = state.modal.days;
  var idx = days.indexOf(i);
  if(idx === -1) days.push(i); else days.splice(idx,1);
  days.sort(function(a,b){return a-b;});
  render();
}
function submitTaskForm(){
  var name = state.modal.name.trim();
  if(!name) return;
  var freq = state.modal.freq;
  var dom = Math.min(31, Math.max(1, parseInt(state.modal.dom,10) || 1));
  var days = state.modal.days.length ? state.modal.days : [1];
  if(state.modal.editingId){
    state.recurringTasks = state.recurringTasks.map(function(t){
      if(t.id !== state.modal.editingId) return t;
      return Object.assign({}, t, {
        name: name, frequency: freq,
        daysOfWeek: freq === 'weekly' ? days : undefined,
        dayOfMonth: freq === 'monthly' ? dom : undefined
      });
    });
  } else {
    state.recurringTasks.push({
      id: 'task-' + Date.now(),
      name: name, frequency: freq,
      daysOfWeek: freq === 'weekly' ? days : undefined,
      dayOfMonth: freq === 'monthly' ? dom : undefined,
      completions: {}
    });
  }
  persist();
  state.modal.open = false;
  render();
}
function deleteTaskFromModal(){
  if(state.modal.editingId) deleteTask(state.modal.editingId);
  state.modal.open = false;
  render();
}
function deleteTask(id){
  state.recurringTasks = state.recurringTasks.filter(function(t){return t.id!==id;});
  persist(); render();
}
function toggleCompletion(taskId, dateStr){
  var date = new Date(dateStr + 'T00:00:00');
  var key = dateKey(date);
  state.recurringTasks = state.recurringTasks.map(function(t){
    if(t.id !== taskId) return t;
    var completions = Object.assign({}, t.completions || {});
    if(completions[key]) delete completions[key]; else completions[key] = true;
    return Object.assign({}, t, { completions: completions });
  });
  persist(); render();
}

function addTodo(){
  var v = state.todoInput.trim();
  if(!v) return;
  state.todoItems.push({ id: 'td-'+Date.now(), text: v, done: false });
  state.todoInput = '';
  persist(); render();
}
function toggleTodo(id){
  state.todoItems = state.todoItems.map(function(i){ return i.id===id ? Object.assign({},i,{done:!i.done}) : i; });
  persist(); render();
}
function deleteTodo(id){
  state.todoItems = state.todoItems.filter(function(i){return i.id!==id;});
  persist(); render();
}
function clearDoneTodo(){
  state.todoItems = state.todoItems.filter(function(i){return !i.done;});
  persist(); render();
}

function addShopping(){
  var v = state.shoppingInput.trim();
  if(!v) return;
  state.shoppingItems.push({ id:'sh-'+Date.now(), text:v, done:false });
  state.shoppingInput = '';
  persist(); render();
}
function toggleShopping(id){
  state.shoppingItems = state.shoppingItems.map(function(i){ return i.id===id ? Object.assign({},i,{done:!i.done}) : i; });
  persist(); render();
}
function deleteShopping(id){
  state.shoppingItems = state.shoppingItems.filter(function(i){return i.id!==id;});
  persist(); render();
}
function clearDoneShopping(){
  state.shoppingItems = state.shoppingItems.filter(function(i){return !i.done;});
  persist(); render();
}

function resetAll(){
  if(!confirm('Clear everything? This removes all recurring tasks, to-dos, and shopping items.')) return;
  state.recurringTasks = [];
  state.todoItems = [];
  state.shoppingItems = [];
  persist(); render();
}

/* ---------- render ---------- */
function render(){
  var app = document.getElementById('app');
  app.innerHTML =
    renderHeader() +
    '<main class="main"><div class="main-inner">' + renderTabContent() + '</div></main>' +
    renderNav() +
    renderModal();
}

function renderHeader(){
  return '' +
    '<header class="header"><div class="header-inner">' +
      '<p class="app-title">Home Base</p>' +
      '<button class="reset-link" onclick="resetAll()">Reset</button>' +
    '</div></header>';
}

function renderNav(){
  function btn(tab, label, iconName){
    var active = state.activeTab === tab;
    return '<button class="nav-btn' + (active?' active':'') + '" onclick="setActiveTab(\'' + tab + '\')">' +
      icon(iconName, 20) + '<span>' + label + '</span></button>';
  }
  return '<nav class="nav"><div class="nav-inner">' +
    btn('recurring','Recurring','repeat') +
    btn('todo','To-Do','checkSquare') +
    btn('shopping','Shopping','cart') +
  '</div></nav>';
}

function renderTabContent(){
  if(state.activeTab === 'recurring') return renderRecurringTab();
  if(state.activeTab === 'todo') return renderSimpleListTab('To-do', 'Add a to-do', state.todoItems, 'todoInput', 'addTodo()', 'toggleTodo', 'deleteTodo', 'clearDoneTodo()');
  if(state.activeTab === 'shopping') return renderSimpleListTab('Shopping list', 'Add an item to buy', state.shoppingItems, 'shoppingInput', 'addShopping()', 'toggleShopping', 'deleteShopping', 'clearDoneShopping()');
  return '';
}

function renderRecurringTab(){
  var today = startOfDay(new Date());
  var dueToday = state.recurringTasks.filter(function(t){ return isDueOnDate(t, today); });
  var dueTodayPending = dueToday.filter(function(t){ return !(t.completions && t.completions[dateKey(today)]); });

  var html = '<p class="section-title">Recurring tasks</p>';
  html += '<div class="row-between">' +
    '<p class="muted-text">' + (dueTodayPending.length===0 ? 'All clear for today.' : (dueTodayPending.length + (dueTodayPending.length===1?' task due today':' tasks due today'))) + '</p>' +
    '<button class="btn-primary" onclick="openNewTask()">' + icon('plus',16) + ' Add</button>' +
  '</div>';

  if(dueTodayPending.length > 0){
    html += '<div class="chip-row">';
    dueTodayPending.forEach(function(t){
      html += '<button class="chip" onclick="toggleCompletion(\'' + t.id + '\', \'' + dateKey(today) + '\')"><span class="dot"></span>' + escapeHtml(t.name) + '</button>';
    });
    html += '</div>';
  }

  html += '<div class="toggle-group">' +
    '<button class="toggle-btn' + (state.recurringView==='calendar'?' active':'') + '" onclick="setRecurringView(\'calendar\')">' + icon('calendar',14) + ' Calendar</button>' +
    '<button class="toggle-btn' + (state.recurringView==='list'?' active':'') + '" onclick="setRecurringView(\'list\')">' + icon('list',14) + ' List</button>' +
  '</div>';

  if(state.recurringView === 'calendar'){
    html += renderCalendar() + renderDayPanel();
  } else {
    html += renderTaskListView();
  }
  return html;
}

function renderCalendar(){
  var cells = buildMonthGrid(state.viewDate.getFullYear(), state.viewDate.getMonth());
  var today = startOfDay(new Date());
  var html = '<div class="cal-nav">' +
    '<button onclick="navMonth(-1)">' + icon('chevronLeft',18) + '</button>' +
    '<p class="cal-month mono">' + MONTHS[state.viewDate.getMonth()] + ' ' + state.viewDate.getFullYear() + '</p>' +
    '<button onclick="navMonth(1)">' + icon('chevronRight',18) + '</button>' +
  '</div>';
  html += '<div class="cal-grid-labels">' + DOW.map(function(d){return '<div>'+d+'</div>';}).join('') + '</div>';
  html += '<div class="cal-grid">';
  cells.forEach(function(date){
    if(!date){ html += '<div class="cal-cell empty"></div>'; return; }
    var key = dateKey(date);
    var isToday = sameDay(date, today);
    var isSelected = sameDay(date, state.selectedDay);
    var dueTasks = state.recurringTasks.filter(function(t){ return isDueOnDate(t,date); });
    var isPast = date < today;
    var cls = 'cal-cell' + (isSelected?' selected':(isToday?' today':''));
    html += '<button class="' + cls + '" onclick="selectDay(' + date.getFullYear() + ',' + date.getMonth() + ',' + date.getDate() + ')">' +
      '<span class="mono">' + date.getDate() + '</span>';
    if(dueTasks.length > 0){
      html += '<span class="cal-dots">';
      dueTasks.slice(0,3).forEach(function(t){
        var done = t.completions && t.completions[key];
        var dotColor = isSelected ? '#ffffff' : (done ? '#10b981' : (isPast ? '#e11d48' : '#f59e0b'));
        html += '<span class="cal-dot" style="background:' + dotColor + '"></span>';
      });
      html += '</span>';
    }
    html += '</button>';
  });
  html += '</div>';
  return html;
}

function renderDayPanel(){
  var day = state.selectedDay;
  var key = dateKey(day);
  var dueTasks = state.recurringTasks.filter(function(t){ return isDueOnDate(t, day); });
  var html = '<div class="day-panel"><p class="day-panel-title mono">' + DOW_FULL[day.getDay()] + ', ' + MONTHS[day.getMonth()] + ' ' + day.getDate() + '</p>';
  if(dueTasks.length === 0){
    html += '<p class="muted-text">Nothing scheduled.</p>';
  } else {
    dueTasks.forEach(function(t){
      var done = t.completions && t.completions[key];
      html += '<div class="task-row">' +
        '<button class="task-check-label" onclick="toggleCompletion(\'' + t.id + '\', \'' + key + '\')">' +
          '<span class="check-box' + (done?' done':'') + '">' + (done?icon('check',12):'') + '</span>' +
          '<span class="task-name' + (done?' done':'') + '">' + escapeHtml(t.name) + '</span>' +
        '</button>' +
        '<button class="icon-btn" onclick="openEditTask(\'' + t.id + '\')">' + icon('pencil',14) + '</button>' +
      '</div>';
    });
  }
  html += '</div>';
  return html;
}

function renderTaskListView(){
  if(state.recurringTasks.length === 0){
    return '<p class="empty-text">No recurring tasks yet. Add your first one above.</p>';
  }
  var groups = [ ['daily','Daily'], ['weekly','Weekly'], ['monthly','Monthly'] ];
  var today = startOfDay(new Date());
  var html = '';
  groups.forEach(function(g){
    var freq = g[0], label = g[1];
    var items = state.recurringTasks.filter(function(t){ return t.frequency === freq; });
    if(items.length === 0) return;
    html += '<div class="group-block"><p class="group-label mono">' + label + '</p><div class="list-card">';
    items.forEach(function(t){
      var dueToday = isDueOnDate(t, today);
      var doneToday = t.completions && t.completions[dateKey(today)];
      var next = nextOccurrence(t, today);
      html += '<div class="list-row">' +
        '<div class="list-row-main">' +
          '<p class="list-row-title">' + escapeHtml(t.name) + '</p>' +
          '<p class="list-row-sub mono">' + scheduleLabel(t) + (next ? ' &middot; Next ' + MONTHS[next.getMonth()].slice(0,3) + ' ' + next.getDate() : '') + '</p>' +
        '</div>' +
        '<div style="display:flex; align-items:center; gap:8px; flex-shrink:0;">';
      if(dueToday){
        html += '<button class="round-check' + (doneToday?' done':'') + '" onclick="toggleCompletion(\'' + t.id + '\', \'' + dateKey(today) + '\')">' + (doneToday?icon('check',14):'') + '</button>';
      }
      html += '<button class="icon-btn" onclick="openEditTask(\'' + t.id + '\')">' + icon('pencil',14) + '</button>' +
        '<button class="icon-btn" onclick="deleteTask(\'' + t.id + '\')">' + icon('trash',14) + '</button>' +
      '</div></div>';
    });
    html += '</div></div>';
  });
  return html;
}

function renderSimpleListTab(title, placeholder, items, inputKey, addCall, toggleFn, deleteFn, clearCall){
  var pending = items.filter(function(i){return !i.done;});
  var done = items.filter(function(i){return i.done;});
  var html = '<p class="section-title">' + title + '</p>';
  html += '<div class="input-row">' +
    '<input class="text-input" type="text" placeholder="' + escapeHtml(placeholder) + '" value="' + escapeHtml(state[inputKey]) + '" ' +
      'oninput="state.' + inputKey + '=this.value" onkeydown="if(event.key===\'Enter\'){' + addCall + '}">' +
    '<button class="btn-primary" onclick="' + addCall + '">' + icon('plus',18) + '</button>' +
  '</div>';

  if(pending.length === 0 && done.length === 0){
    html += '<p class="empty-text">Nothing here yet.</p>';
  }

  if(pending.length > 0){
    html += '<div class="list-card" style="margin-bottom:16px;">';
    pending.forEach(function(item){
      html += '<div class="simple-row">' +
        '<button class="simple-row-left" onclick="' + toggleFn + '(\'' + item.id + '\')">' +
          '<span class="sq-check"></span>' +
          '<span class="simple-text">' + escapeHtml(item.text) + '</span>' +
        '</button>' +
        '<button class="icon-btn" onclick="' + deleteFn + '(\'' + item.id + '\')">' + icon('trash',14) + '</button>' +
      '</div>';
    });
    html += '</div>';
  }

  if(done.length > 0){
    html += '<div class="row-between" style="margin-bottom:8px;">' +
      '<p class="group-label mono" style="margin:0;">Done</p>' +
      '<button class="clear-btn" onclick="' + clearCall + '">' + icon('rotate',12) + ' Clear</button>' +
    '</div>';
    html += '<div class="list-card">';
    done.forEach(function(item){
      html += '<div class="simple-row">' +
        '<button class="simple-row-left" onclick="' + toggleFn + '(\'' + item.id + '\')">' +
          '<span class="sq-check done">' + icon('check',12) + '</span>' +
          '<span class="simple-text done">' + escapeHtml(item.text) + '</span>' +
        '</button>' +
        '<button class="icon-btn" onclick="' + deleteFn + '(\'' + item.id + '\')">' + icon('trash',14) + '</button>' +
      '</div>';
    });
    html += '</div>';
  }
  return html;
}

function renderModal(){
  if(!state.modal.open) return '';
  var m = state.modal;
  var html = '<div class="modal-overlay" onclick="if(event.target===this) closeModal()"><div class="modal-card">' +
    '<div class="modal-head"><p class="modal-title">' + (m.editingId ? 'Edit task' : 'New recurring task') + '</p>' +
      '<button class="icon-btn" onclick="closeModal()">' + icon('x',18) + '</button></div>' +
    '<label class="field-label">Task name</label>' +
    '<input class="text-input" style="width:100%; margin-bottom:16px;" type="text" placeholder="Mow the lawn" value="' + escapeHtml(m.name) + '" oninput="state.modal.name=this.value">' +
    '<label class="field-label">Frequency</label>' +
    '<div class="freq-row">';
  ['daily','weekly','monthly'].forEach(function(f){
    html += '<button class="freq-btn' + (m.freq===f?' active':'') + '" onclick="setModalFreq(\'' + f + '\')">' + f + '</button>';
  });
  html += '</div>';

  if(m.freq === 'weekly'){
    html += '<label class="field-label">Which days</label><div class="dow-row">';
    DOW.forEach(function(d,i){
      html += '<button class="dow-btn' + (m.days.indexOf(i)!==-1?' active':'') + '" onclick="toggleModalDay(' + i + ')">' + d + '</button>';
    });
    html += '</div>';
  }
  if(m.freq === 'monthly'){
    html += '<label class="field-label">Day of month</label>' +
      '<input class="num-input" type="number" min="1" max="31" value="' + escapeHtml(m.dom) + '" oninput="state.modal.dom=this.value" style="margin-bottom:16px;">';
  }

  html += '<div class="modal-actions">';
  if(m.editingId){
    html += '<button class="btn-danger-outline" onclick="deleteTaskFromModal()">' + icon('trash',14) + ' Delete</button>';
  }
  html += '<button class="btn-save" onclick="submitTaskForm()">' + (m.editingId ? 'Save changes' : 'Add task') + '</button>';
  html += '</div></div></div>';
  return html;
}

/* ---------- init ---------- */
function registerSW(){
  if('serviceWorker' in navigator){
    navigator.serviceWorker.register('sw.js').catch(function(){});
  }
}
loadState();
render();
registerSW();
</script>
</body>
</html>
